{% extends "pos/base.html" %}
{% load static %}
{% block title %}Reports — Nawab{% endblock %}
{% block content %}
<div class="topbar">
  <i class="ti ti-chart-bar" style="font-size:17px;color:var(--ink3)"></i>
  <span class="topbar-title">Reports</span>
  <div class="topbar-right">
    <span class="chip active" id="rf-today" onclick="repFilter('today',this)">Today</span>
    <span class="chip" id="rf-week" onclick="repFilter('week',this)">Week</span>
    <span class="chip" id="rf-month" onclick="repFilter('month',this)">Month</span>
    <span class="chip" id="rf-custom" onclick="repFilter('custom',this)">Custom</span>
    {% include "pos/_user_controls.html" %}
  </div>
</div>
<div class="rep-layout" id="rep-layout"></div>
{% endblock %}
{% block extra_js %}
<script src="{% static 'pos/js/reports.js' %}?v=2"></script>
{% endblock %}
